<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <title>Memon Systems</title>
  <style>
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.9);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-family: sans-serif;
      display: flex;
      gap: 10px;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    body.drawing-active {
      user-select: none;
      -webkit-user-select: none;
    }
    #drawing-toolbar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
      z-index: 1000;
      pointer-events: none; /* Only the toolbar inside should be interactive by default, but we'll enable container hover */
    }
    #drawing-toolbar-container:hover {
      pointer-events: auto;
    }
    #drawing-toolbar {
      background: rgba(15, 23, 42, 0.95);
      padding: 8px;
      border-radius: 12px;
      display: flex;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      gap: 8px;
      align-items: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #drawing-toolbar-container:hover #drawing-toolbar,
    #drawing-toolbar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .tool-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      width: 40px;
      height: 40px;
    }
    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateY(-2px);
    }
    .tool-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
    .tool-sep {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 4px;
    }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }
    #diagram-select {
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      padding: 6px 12px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
  <script src="/node_modules/svg-pan-zoom/dist/svg-pan-zoom.min.js"></script>
</head>
<body style="background: #0f172a; margin: 0; overflow: hidden; height: 100vh; width: 100vw;">
  <div id="controls">
    <select id="diagram-select"></select>
  </div>

  <div id="drawing-toolbar-container">
    <div id="drawing-toolbar">
      <button class="tool-btn active" id="tool-select" title="Select (S)"><i class="fas fa-mouse-pointer"></i></button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="tool-pencil" title="Pencil (P)"><i class="fas fa-pencil-alt"></i></button>
      <button class="tool-btn" id="tool-arrow" title="Arrow (A)"><i class="fas fa-long-arrow-alt-right"></i></button>
      <button class="tool-btn" id="tool-rect" title="Rectangle (R)"><i class="fas fa-square"></i></button>
      <button class="tool-btn" id="tool-circle" title="Circle (C)"><i class="fas fa-circle"></i></button>
      <button class="tool-btn" id="tool-text" title="Text (T)"><i class="fas fa-font"></i></button>
      <div class="tool-sep"></div>
      <input type="color" id="tool-color" value="#3b82f6" title="Color">
      <div class="tool-sep"></div>
      <button class="tool-btn" id="tool-undo" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
      <button class="tool-btn" id="tool-clear" title="Clear All"><i class="fas fa-trash"></i></button>
    </div>
  </div>

  <div id="graph" class="mermaid" style="height: 100%; width: 100%;"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
